body:
  text: 明嗣祖沙門費隱通容輯著居士夏春暉龔士龍較福州西禪懶菴鼎需禪師遍參名宿法無異味歸里結菴於薑峯絶頂不下山者三年妙喜菴于洋嶼師之友彌光與師書云菴主手段與諸方別可來少欵何如師不答光以計邀師飯師往赴之會妙喜為諸徒入室師隨喜焉妙喜舉僧問馬祖如何是佛祖曰即心是佛汝作麼生師下語妙喜詬之曰汝見解如此敢妄為人師耶鳴鼓普説訐其平生珍重得力處排為邪解師淚交頤不敢仰視默計曰我之所證既為所排西來不傳之旨豈止此耶遂歸心弟子之列一日喜問曰內不放出外不放入正恁麼時如何師擬開口喜拈竹篦劈脊連打三下師於此大悟厲聲曰和尚已多了也喜又打一下師禮拜喜笑曰今日方知吾不汝欺也遂印以偈云頂門竪亞摩醯眼肘後斜懸奪命符瞎却眼卸却符趙州東壁挂葫蘆於是聲名喧動叢林通容曰大慧鉗鎚爐鞴高出諸方故相從者多而得法者亦盛于長樂洋嶼菴僅五十日打發十一人開悟懶菴亦是其數且懶菴已出頭為人尚訐其平日珍重得力處排為邪解使他氣宇索然向咽喉一拶直得頂門開眼此非大慧孰能歟慶元府育王佛照德光禪師臨江軍彭氏子志學之年依本郡東山光化寺吉禪師落髮一日入室吉問不是心不是佛不是物是什麼師罔措遂致疑通夕不𥧌次日詣方丈請益昨日蒙和尚垂問既不是心又不是佛又不是物畢竟是甚麼望和尚慈悲指示吉震威一喝曰這沙彌更要我與汝下注腳在拈棒劈脊打出師於是有省後謁月菴果應菴華百丈震終不自肯適大慧領育王四海英材鱗集師亦與焉大慧室中問師喚作竹篦則觸不喚作竹篦則背不得下語不得無語師擬對慧便棒師豁然大悟從前所得瓦解氷消通容曰佛照於吉師機下有省又謁諸大老終不自肯以藕斷絲未斷也大慧與他海水逆流而江湖傾覆矣福州玉泉曇懿禪師久依圓悟自謂不疑紹興初出住興化祥雲法席頗盛大慧入閩知其所見未徹致書令來師遲遲慧小參且痛斥仍榜告四衆師不得已破夏謁之慧鞠其所證既而曰汝恁麼見解敢嗣圓悟老人耶師退院親之一日入室慧問我要個不會禪底做國師師曰我做得國師去也慧喝出居無何慧語之曰香巖悟處不在擊竹邊俱胝得處不在指頭上師乃頓明通容曰臨濟家法驅耕夫之牛奪飢人之食大慧訐鼎需平生珍重排為邪解傍曇懿所見未諦痛斥其非令他當機撒手直下翻身可謂是其人矣近禮侍者三山人久侍大慧嘗默究竹篦話無所入一日入室罷求指示慧曰汝是福州人我説個喻向汝如將名品荔枝和皮殼一時剝了以手送在汝口裡祇是汝不解吞師不覺失笑曰和尚吞却即事慧後問師曰前日吞了底荔枝祇是汝不知滋味師曰若知滋味轉見事通容曰大慧説亦説得是近禮解亦解得親但平沙落鴈一句作麼生道提刑吳偉明居士字元昭久參真歇了禪師得自受用為極致後謁大慧於洋嶼菴隨衆入室慧舉無佛性話問之公擬答慧以竹篦便打公無對遂留咨參一日慧謂曰不須呈伎倆直須啐地拆曝地斷方敵得生死若祇呈伎倆有甚了期即辭去道次延平倐然契悟連書數頌寄慧皆室中所問者有曰不是心不是物不是物通身一具金鎖骨趙州親見老南泉解道鎮州出蘿蔔慧即説偈證之曰通身一具金鎖骨堪與人天為軌則要識臨濟小廝兒便是當年白拈賊通容曰偉明雖悟一具金鎖骨則不無若遇敲骨取髓底人管取納欵有分然而能為白拈賊則與臨濟同參矣內翰曾開居士字天遊久參圓悟暨往來大慧之門有日矣紹興辛未佛海補三衢光孝公與超然居士趙公訪之問曰如何是善知識海曰燈籠露柱貓兒狗子公曰為什麼贊即歡喜毀即煩惱海曰侍郎曾見善知識否公曰某三十年參問何言不見海曰向歡喜處見煩惱處見公擬議海震聲便喝公擬對海曰開口底不是公開然海召曰侍郎向甚處去也公猛省遂點頭説偈曰咄哉瞎驢叢林妖孽震地一聲天機漏泄有人更問意如何拈起拂子劈口截海曰也祇得一橛通容曰一個死曾開被佛海弄成活天遊然佛海猶謂祇得一橛且道是那一橛參洪州百丈山懷海禪師者福州長樂人也師侍馬祖行次見一群野鴨飛過祖曰是甚麼師曰野鴨子祖曰甚處去也師曰飛過去也祖遂搊師鼻負痛失聲祖曰又道飛過去也師於言下有省師再參侍立次祖目視繩牀角拂子師曰即此用離此用祖曰汝向後開兩片皮將何為人師取拂子竪起祖曰即此用離此用師擬挂拂子於舊處祖震威一喝師直得三日耳聾師謂衆曰佛法不是小事老僧昔被馬大師一喝直得三日耳聾黃檗聞舉不覺吐舌師曰子已後莫嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫師曰如是如是見與師齊減師半德見過於師方堪傳授子甚有超師之見檗便禮拜通容曰黃檗因百丈舉馬祖一喝明機終嗣百丈而不嗣馬祖以親聞而面稟故也百丈猶疑之曰子以後莫嗣馬祖去麼檗曰不然今日因和尚舉得見馬祖大機之用然且不識馬祖若嗣馬祖已後喪我兒孫此雖棒下無生忍臨機不見師而亦師承為萬古法要人面稟嘉猷有蒙受用不可欺心故也又明主張此門必不可無師承而濫外道也韶州雲門山光奉院文偃禪師以己事未明往參睦州州才見來便閉却門師乃扣門州曰誰師曰某甲州曰作甚麼師曰己事未明乞師指示州開門一見便閉却師如是連三日扣門至第三日州開門師乃拶入州便擒住曰道道師擬議州便推出曰秦時𨍏轢鑽遂掩門損師一足師從此悟入通容曰睦州向銀山鐵壁令雲門拶入故雲門得氣宇如王自在無比藏身北斗獨步東山乃至為人打翻露布葛藤剪却常情見解格外縱擒言前定奪非上根利器莫能窺其倣佛真為受睦州毒氣深而為人手段辣也襄州洞山守初宗慧禪師初參雲門門問近離甚處師曰查渡門曰夏在甚處師曰湖南報慈曰幾時離彼師曰八月二十五門曰放汝三頓棒師至明日却上問訊昨日蒙和尚放三頓棒不知過在甚麼處門曰飯袋子江西湖南便恁麼去師於言下大悟遂曰他後向無人煙處不蓄一粒米不種一莖菜接待十方往來盡與他抽釘拔楔拈却炙脂帽子脫却鶻臭布衫教伊灑灑地作個無事衲僧豈不快哉門曰汝身如椰子大開得如許大口師便禮拜通容曰古人田地穩密故能據定乾坤把住要關於接對次自然令人開發故雲門放守初三頓棒直得疑聚不已再與提持便乃七通八達今人於接對次或有機用唯恐人之不信又復與他重新解説一遍使人愈明白而愈轉遠縱有多般施設亦唯清風過耳也澧州欽山文邃禪師福州人也少依杭州大慈山寰中禪師受業時巖頭雪峯在衆覩師吐論知是法器相率遊二大士各承德山印記師雖屢激揚而終然凝滯一日問德山曰天王也恁麼道龍潭也恁麼道未審和尚作麼生道山曰汝試舉天王龍潭道底看師擬進語山便打師被打歸延壽堂曰是則是打我太煞巖頭曰汝恁麼道後不得道見德山來後於洞山言下發解乃為之嗣通容曰德山打欽山乃本色鉗鎚而欽山當機不薦及謂打我太煞則三公同遊利鈍自見後於洞山言下發解則機用軟弱益可知矣雖然發解之後德山向施鉗鎚皆受用得著人亦知乎舒州投子義青禪師青社李氏子七齡頴異往妙相寺出家試經得度習百法論未幾嘆曰三祗途遠自困何益乃入洛聽華嚴義若貫珠嘗讀諸林菩薩偈至即心自性猛省曰法離文字寧可講乎即棄遊宗席時圓鑑禪師居會聖巖一夕夢畜青色鷹為吉徵屆旦師來鑑禮延之令看外道問佛不問有言不問無言因緣經三載一日問曰汝記得話頭麼試舉看師擬對鑑掩其口師了然開悟遂禮拜鑑曰汝妙悟玄機耶師曰設有也須吐却時資侍者在旁曰青華嚴今日如病得汗師回顧曰合取狗口若更忉忉我即便嘔自此復經三年鑑時出洞下宗旨示之悉皆妙契付以太陽頂相皮履直裰囑曰代吾續其宗風無久滯此善宜護持遂書偈送曰須彌立太虗日月輔而轉群峯漸倚他白雲方改變少林風起叢曹溪洞簾卷金鳳宿龍巢宸苔豈車碾令依圓通秀禪師師至彼無所參問唯嗜睡而已執事白通曰堂中有僧日睡當行規法通曰是誰曰青上座通曰未可待與按過通即拽杖入堂見師正睡乃擊牀訶曰我這裡無間飯與上座喫了打眠師曰和尚教某何為通曰何不參禪去師曰美食不中飽人喫通曰爭奈大有人不肯上座師曰待肯堪作甚麼通曰上座曾見甚麼人來師曰浮山通曰怪得恁麼頑賴遂握手相笑歸方丈繇是道風籍甚通容曰易曰鼎折足覆公餗言其不勝任也洞山之道傳雲居膺膺傳同安丕丕傳同安志志傳梁山觀觀傳太陽玄至玄無正傳遂將衣鉢寄托與浮山鑑既久而得投子青青後始有芙蓉楷丹霞淳真歇了諸公出世道滿天下是知洞上之宗至投子青為中興青公於洞上宗旨悟入玄微不落沁漏故能起太陽之既墜振寶鏡之將埋唯公得其勝任雖然浮山鑑法眼不明關吏不嚴雖青公亦無深造且鼎足折公餗覆吾知其不勝任矣以有浮山鑑始有投子青以有投子青始能中興其道易曰君子知微知彰知柔知剛萬夫之望二公以之鼎州德山宣鑒禪師簡州周氏子早歲出家依年受具精究律藏於性相諸經貫通旨趣常講金剛般若時謂之周金剛嘗謂同學曰一毛吞海海性無虧纖芥投鋒鋒利不動學與無學唯我知焉復聞南方禪席頗盛師氣不平乃曰出家兒千劫學佛威儀萬劫學佛細行不得成佛南方魔子敢言直指人心見性成佛我當摟其窟穴滅其種類以報佛恩遂擔青龍疏鈔至澧陽路上見一婆子賣餅因息肩買餅點心婆指擔云這個是什麼文字師曰青龍疏鈔婆曰講何經師曰金剛經婆曰我有一問汝若答得施與點心若答不得且別處去金剛經道過去心不可得現在心不可得未來心不可得未審上座點那個心師無語遂往龍潭至法堂曰久響龍潭及乎到來潭又不見龍又不現潭引身曰子親到龍潭師無語遂捿止焉一夕侍立次潭曰更深何不下去師珍重便出却回曰外面黑潭點紙燭度與師師擬接潭復吹滅師於此大悟便禮拜潭曰子見個甚麼師曰從今向去更不疑天下老和尚舌頭也至來日龍潭升座謂衆曰可中有個漢牙如劍樹口似血盆一棒打不回頭他時向孤峯頂上立吾道去在師將疏鈔堆法堂前舉火炬曰窮諸玄辨若一毫置於太虗竭世樞機似一滴投於巨壑遂焚之於是禮辭通容曰德山氣宇自衝昂在蜀講解聲壓遐邇初聞南方即心即佛之道即欲摟滅窟族此之氣槩固不凡矣及逢婆子詰問三心而不將義理應對亦不強辨抑人須知有太公之道而無欺心自負吾知師之講解斷非今時類也因婆得參龍潭而龍潭亦知師之器厚故居會下相為折銼令其技窮謀盡一夕吹滅紙燭要渠頭首自落故德山絶無情見而殺氣逼人也以此為人為人極徹以此殺人殺人見血其猶千里萬里鈍鐵一條故德山宗風高出宇宙者也秀州華亭船子德成禪師節操高邈度量不群自印心於藥山與道吾雲巖為同道交洎離藥山乃謂二同志曰公等應各據一方建立藥山宗旨余率性疏野唯好山水樂情自遣無所能也他後知我所止之處若遇靈利座主指一人來或堪雕琢將授生平所得以報先師之恩遂分携至秀州華亭泛一小舟隨緣度日以接四方往來之者時人莫知其高蹈因號船子和尚道吾後到京口遇夾山上堂僧問如何是法身山曰法身無相曰如何是法眼山曰法眼無瑕道吾不覺失笑山便下座請問道吾某甲適來祇對這僧話必有不是致令上座失笑望上座不吝慈悲吾曰和尚一等是出世未有師在山曰某甲甚處不是望為説破吾曰某甲終不説請和尚却往華亭船子處去山曰此人如何吾曰此人上無片瓦下無卓錐和尚若去須易服而往山乃散衆束裝直造華亭船子才見便問大德住甚麼寺山曰寺即不住住即不似師曰不似似個甚麼山曰不是目前法師曰甚處學得來山曰非耳目之所到師曰一句合頭語萬劫繫驢橛師又問垂絲千尺意在深潭離鈎三寸子何不道山擬開口被師一橈打落水中山才上船師又曰道道山擬開口師又打山豁然大悟乃點頭三下師曰竿頭絲線從君弄不犯清波意自殊由遂問拋綸擲鈎師意如何師曰絲懸緑水浮定有無之意山曰語帶玄而無路舌頭談而不談師曰釣盡江波金鱗始遇山乃掩耳師曰如是如是乃囑曰汝向去直須藏身處沒蹤迹沒蹤迹處莫藏身吾二十年在藥山祇明斯事汝今既得他後莫住城隍聚落但向深山裡钁頭邊覔取一個半個接續無令斷絶山乃辭行頻頻回顧師遂喚闍黎山乃回首師竪起橈子曰汝將謂別有乃覆船入水而逝通容曰夾山若不是道吾與他指引於船子處決不能開發故夾山悟道而道吾有功也然夾山受船子囑付尚復頻頻回顧心猶未死何也覺範謂信力尚微未大通徹余謂覺範只知其一不知其二吾謂船子雖有深錐痛劄之功而亦有紆遲鈍置之過蓋夾山既在棒下翻身又復授他程途之迹謂汝向去直須藏身處沒蹤迹沒蹤迹處莫藏身又云吾二十年在藥山祇明斯事致使夾山重復遲疑將謂別有不能徹信到底所謂師家若有實法與人土亦難消正此意也故夾山雖信力未大通徹而船子實有紆遲鈍置之過也故曰金屑雖貴落眼成翳何況以二十年中拖帶蘊藉將為事耶雖然船子見夾山疑為別有竭力為渠覆舟而死使他剿除所謂解鈴須是繫鈴人千古獨師大哉漳州三平義忠禪師福州楊氏子初參石鞏鞏常張弓架箭接機師詣法席鞏曰看箭師乃撥開胸曰此是殺人箭活人箭又作麼生鞏乃彈弓弦三下師乃禮拜鞏曰二十年張弓架箭祇射得半個聖人遂拗折弓箭通容曰門庭高機鋒峻非大造就不敢入頭若得入頭自然七穿八穴石鞏三平以之雖然三平末後猶被石鞏勾瞞却也不知澧州洛浦山元安禪師鳳翔麟遊人也丱年出家具戒通經論問道臨濟後為侍者濟嘗對衆美之曰臨濟門下一隻箭誰敢當鋒師蒙印可自謂已足一日侍立次有座主參濟濟問有一人於三乘十二分教明得有一人不於三乘十二分教明得且道此人是同是別主曰明得即同明不得即別師曰這裡是甚麼所在説同説別濟顧師曰汝又作麼生師便喝濟送座主回問師汝豈不是適來喝老僧者師曰是濟便打師後辭濟濟問甚處去師曰南方去濟以拄杖劃一劃曰過得這個便去師乃喝濟便打師作禮而去濟明日升堂曰臨濟門下有個赤梢鯉魚搖頭擺尾向南方去不知向誰家虀甕裡淹殺師遊歷罷直往夾山卓菴經年不訪夾山山修書令僧馳往師接便坐却再展手索僧無對師便打曰歸去舉似和尚僧回舉似山曰這僧若開書三日內必來若不開書斯人救不得也師果三日後至見夾山不禮拜乃當面叉手而立山曰雞棲鳳巢非其同類出去師曰自遠趨風請師一接山曰目前無闍黎此間無老僧師便喝山曰住住且莫草草匇匇雲月是同溪山各異截斷天下人舌頭即不無闍黎爭教無舌人解語師佇思山便打因茲服膺通容曰臨濟稱洛浦一隻箭則洛浦亦深造矣但末後謂向南方去不知落誰家虀甕裡淹殺故知臨濟未全肯也不然見夾山死於機下臨濟眼目何在也然亦須知夾山受船子惡鉗鎚故接洛浦亦不鮮也蘄州三角山令圭禪師初參清平平問來作麼師曰來禮拜平曰禮拜阿誰師曰特來禮拜和尚平咄曰這鈍根阿師師乃禮拜平以手斫師頸一下從此領旨通容曰清平不具大人相受人禮拜也不會致使三角布裙拖地黃龍慧南禪師依泐潭澄禪師分座接物名振諸方偶同雲峯悅禪師遊西山話及雲門法道峯曰澄公雖是雲門之後法道異矣南詰其所以異峯曰雲門如九轉丹砂點鐵成金澄公藥汞銀徒可玩入煅則流去南怒以枕擲之峯雖謝過而又曰雲門氣宇如王甘死語下乎澄公有法授人死語也死語其能活人乎即背去南挽之曰若如是則誰可汝意峯曰石霜圓手段出諸方公宜見之不可後也南默計曰悅師翠巖使我見石霜於悅何有哉即造石霜及中途聞慈明不事事忽叢林無意見之遂登衡嶽謁福嚴賢禪師賢命掌書記俄賢卒郡守請慈明補之既至目其貶剝諸方件件數為邪解南為之氣索遂造其室欲行師資禮明曰書記已領徒遊方設使有疑可坐商略不必作是行徑南哀懇愈切明曰公學雲門禪必善其旨如云放洞山三頓棒是有喫棒分耶是無喫棒分耶南曰是有喫棒分明色莊曰若爾則從朝至暮鵲噪鴉鳴亦有喫棒分即端坐受南炷香作禮明復問曰趙州謂臺山婆子我為汝勘破了也且道那裡是他勘破婆子處南汗下不能加答連日入室請決明唯詬罵而已一日南曰罵豈慈悲法施耶明曰汝作罵會耶南於是大悟遂作頌曰傑出叢林是趙州老婆勘破沒來繇而今四海清如鏡行人莫與路為讐呈慈明明許可之通容曰慈明之為南公乃師資相關手段固出人而雲峯為南公乃友道相與有出格勉勵於祖林中亦不多見蓋雲峯見道真而擇法明故能力排澄公使老南寶惜悉棄去而見慈明得到大徹祕書吳恂居士字德夫居晦堂入室次堂謂曰平生學解記憶多聞即不問汝父母未生已前道將一句來公擬議堂以拂子擊之即領深旨連呈三偈其後曰咄哉這多智俗漢咬盡古今公案忽於狼藉堆頭拾得𧏙蜋糞彈明明不值分文萬兩黃金不換等間拈出示人祇為走盤難看咦堂答曰水中得火世還稀看看令人特地疑自古不存師弟子如今却許老胡知通容曰悟道雖則有時節因緣不可拘論然亦在師家田地穩密機用顯大於師資相扣之時一擡一搦一機一拶自然令人得活西來意不紆葛藤不墮死水是亦時節因緣也樞密吳厚居士擁節歸鍾陵謁圓通旻禪師曰某頃赴省試過此過趙州關因問前住訥老透關底事如何訥曰且去做官今不覺五十餘年旻曰曾得透關底事麼公曰八次經過常存此念然未甚脫灑在旻度扇與之曰請使扇公即揮扇旻曰有甚不脫灑處公忽有省曰便請末後句旻乃揮扇兩下公曰親切親切旻曰吉獠舌頭三千里通容曰吉獠舌頭三千里還是為他發明還是為他印證左司都貺居士問圓通曰是法非思量分別之所能解當如何湊泊通曰全身入火聚公曰畢竟如何曉會通曰驀直去公沉吟通曰可再喫茶麼公曰不必通曰何不恁麼會公遂契旨曰元來太近通曰十萬八千公占偈曰不可思議是大火聚便恁麼去不離當處通曰咦猶有這個在公曰乞師再垂指示通曰便恁麼去鐺是鐵鑄公頓首謝之通容曰圓通能據欵結案指示使都貺嗚呼尚饗大慧禪師答聖泉圭和尚書曰既得外護者存心相照自可撥置人事頻與衲子輩作佛事久久自殊勝臾望室中與之子細不得容人情不得共伊落草直似之以本分草料教伊自悟自得方是尊宿為人體裁也若是見他遲疑不薦便與之下注腳非但瞎却他眼亦乃失却自家本分手段不得人即是吾輩緣法只如此若得一個半個本分底亦不負平昔志願也大慧禪師答鼓山逮長老書曰專使來收書并信香等知開法出世唱道於石門不忘所從來為嶽長老拈香續楊岐宗派既已承當個事須卓卓地做教徹頭徹尾以平昔實證實悟底一著子端居丈室如擔百二十斤擔子從獨木橋上過腳蹉手跌則和自家性命不可保況復與人抽釘拔楔救濟他人耶古德云此事如八十翁翁入場屋豈是兒戲又古德云我若一向舉揚宗教法堂前草深一丈須倩人看院始得巖頭每云向未屙已前一便眼卓朔地晏國師不跨石門句睦州現成公案放汝三十棒汾陽無業莫妄想魯祖凡見僧入門便轉身面壁而坐為人時當不昧這般體裁方不失從上宗旨耳昔溈山謂仰山曰建法幢立宗旨於一方五種緣備始得成就五種謂外護緣檀越緣衲子緣土地緣道緣聞霜臺趙公是汝請主致政司業鄭公送汝入院二公天下士以此觀之汝於五種緣稍備每有衲子自閩中來者無不稱嘆法席之盛檀越歸向士大夫外護住持無魔障衲子雲集可以趂色力未衰時頻與衲子激揚個事垂手之際須著精彩不得莾鹵蓋近年以來有一種裨販之輩到處學得一堆一擔相似禪往往宗師造次放過遂至承虗接響𮞏相印授誤賺後人致使正宗淡薄單傳直指之風幾掃地矣不可不子細五祖師翁住白雲時嘗答靈源和尚書云今夏諸莊顆粒不收不以為憂其可憂者一堂數百衲子一夏無一人透得個狗子無佛性話恐佛法將滅耳汝看主法底宗師用心又何曾以産錢多少山門大小為重輕米鹽細務為急切來汝既出頭承當個善知識名字當以一味本分事接待方來所有庫司財穀分付知因識果知事分司列局令掌之時時提舉大綱安僧不必多日用齋粥常教後手有餘自然不費力衲子到室中下刃要緊不得拖泥帶水如雪峯空禪師頃在雲居雲門相聚老漢知渠不自欺是個佛法中人故一味以本分鉗鎚似之後來自在別處打發大法既明向所受過底鉗鎚一時得受用方知妙喜不以佛法當人情去年送一册語録來造次顛沛不失臨濟宗旨今送在衆寮中與衲子為將來説法之式若使老漢初為渠拖泥帶水説老婆禪眼開後定罵我無疑所以古人云我不重先師道德只重先師不為我説破若為我説破豈有今日便是這個道理也趙州云若教老僧隨伊根機接人自有三乘十二分教接他了也老僧這裡祇以本分事接人若接不得自是學者根性遲鈍不干老僧事思之思之附宗門雜録四條拈花王荊公問佛慧泉禪師云禪家所謂世尊拈花出在何典泉云藏經亦不載公曰余頃在翰苑偶見大梵天王問佛決疑經三卷因閲之經文所載甚詳梵王至靈山以金色波羅花獻佛舍身為牀座請佛為衆生説法世尊登座拈花示衆人天百萬悉皆罔措獨有金色頭陀破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相分付摩訶大迦葉此經多談帝王事佛請問所以祕藏世無聞者五問此蓋當時義學之徒相與造説誣罔先聖非毀禪宗而自聰禪師問達觀頴和尚凡五問欲杜邪謬故辨詳之僧自聰問達觀頴和尚曰諸經論家多言西天自迦葉至師子尊者祖師相傳至此斷絶其實如何答曰吁如此説者生滅心也不知為法惜人螢鬪杲日填滄海枉勞形耳且二十四祖師子尊者度婆舍斯多兼出達摩達其緣具在唐會稽沙門靈徹序木陵沙門法炬所編寶林傳并據前魏天竺三藏支疆梁樓續法記具明師子尊者遇難以前傳衣付法之事從大迦葉為首直下血脈第二十五祖婆舍斯多二十六祖不如密多二十七祖般若多羅付菩提達磨即唐土初祖也原支疆梁樓三藏來震旦祇洛陽白馬寺時即前魏常道卿公景元二年辛巳歲也師子入滅方二年矣以是顯知經論諸師誣罔後昆吁哉奈何問曰達磨大師自西天帶楞伽經四卷來是否答曰非也好事者為之耳且達磨單傳心印不立文字直指人心見性成佛豈有四卷經耶聰曰寶林傳亦如是説頴曰編修者不暇詳討矣試為子評之夫楞伽經三譯而初譯四卷乃宋天竺三藏求那跋陀之所譯次十卷元魏時菩提流支與達磨同時下藥以毒達磨者是也後七卷唐天后代于闐三藏實叉難陀譯以此證之先後虗實可知矣仰山寂禪師亦常辨此其事甚明問曰傳法偈無翻譯槩付法藏傳中無此偈以致諸家多説無據願垂至誨答噫子孫支分是非蜂起不能根究耳只如達磨未入此土已會唐言何以知之初見梁武時對問其事即可知矣後又二祖可大師十年侍奉以至立雪斷臂志求祖乘至勤誠矣後達磨告曰吾有一袈裟付汝為信世必有疑者云吾西天之人子此土之子得法實信汝當以吾言證之又云自釋迦聖師至般若多羅以及於吾皆傳衣表法傳法留偈吾今付汝偈曰吾本來茲土傳法救迷情一花開五葉結果自然成因引從上諸祖偈一一授之內傳法印以契證心外付袈裟以定宗旨以此則知達磨付二祖決矣此乃單傳口授何暇翻譯哉問曰天台尊者一心三觀法門與祖意如何答曰子若不問吾難以言也吾嘗見教中云吾有正法眼藏付囑大迦葉且不在三乘五教之內原佛祖之教皆有傳授昔聞大師於藏中得龍樹所造中論覽至第四卷破諸法性有定性則無因果等事如頌曰因緣所生法我説即是空亦名為假名亦名中道義次頌云未曾有一法不從因緣生是故一切法無不是空者繇此達一心三觀曰空曰假曰中若據教意大凡一偈皆有四句以成其意耳智者離為三觀似枝蔓又未詳傳授因此便言遠稟龍樹以樹為祖近稟思大則可知矣若間世承稟吾恐後世必有聰利之人空看佛經自稟釋迦豈其然乎良繇智者具大福德智慧辨才纍為帝師故成一家之説辭博理微而後世子孫稱傳祖教乃番毀師子尊者親付法與婆舍斯多以至此土六祖傳衣付法以為邪解嗚呼吾若備論即成是非子自詳之問曰自達磨至此土因何諸祖師言教與西天諸祖洎六祖已上不同牛頭一宗北秀荷澤南嶽讓青源思言句漸異見解差殊各黨師門互毀盟主如何得息諍去答曰快哉此問且祖師來此土如一樹子就地下種因緣和合而生芽也種即達磨并二祖也枝葉即道副總持道育之徒也洎二祖為種三祖為芽乃至六祖為種南嶽讓為芽也其牛頭神秀荷澤等皆枝葉耳然六祖下枝葉繁茂生子亦多其種又逐風土所宜採取得葉貴葉得枝貴枝亦猶樹焉在南為橘在北為枳雖形味有變而根本豈有變乎又類日焉在東為朝在西為暮日亦逐方而轉則輪影也其空必不轉必矣德何快哉子但了其內心莫隨其外法內心者脫其生死外法者逐其愛惡愛惡生則去佛祖遠矣為子等間籤出正宗及橫枝言句各於後述其繇序令學者明其嫡庶者矣覺夢堂重較五家宗派序皇明景德間吳僧道原集傳燈三十卷自曹溪下列為兩派一曰南嶽讓讓出馬大師一曰青原思思出石頭遷自兩派下又分五宗馬大師出八十四員善知識內有百丈海出黃檗運大溈佑二人運下出臨濟玄故號臨濟宗佑下出大仰寂故號溈仰宗八十四人又有天王悟悟得龍潭信信得德山鑒鑒得雪峯存存下出雲門宗法眼宗石頭遷出藥山儼天皇悟二人悟下得慧真真得幽間間得文賁便絶唯藥山得雲巖晟晟得洞山價價得曹山寂是為曹洞宗今傳燈却修雲門法眼兩宗歸石頭下誤矣緣同時道悟有兩人一曰江陵城西天王寺道悟渚宮人崔子玉之後嗣馬祖元和十三年四月十三日化正議大夫丘玄素撰塔銘文幾千言其略云馬祖祝曰它日莫離舊處故還渚宮一曰江陵城東天皇寺道悟婺州東陽人姓張氏嗣石頭元和二年丁亥化律師符載所撰二所載生緣出處甚詳但緣道原採集傳燈之日非一一親往尋討不過宛轉托人捃拾而得其差誤可知也自景德至今天下四海以傳燈為據雖列剎據位立宗者不能略加究辨唯丞相無盡居士及呂夏卿二君子每會議宗門中事嘗曰石頭得藥山山得曹洞一宗教理行果言説宛轉且天皇道悟下出個周金剛呵風罵雨雖佛祖不敢嬰其鋒恐自天皇或有差誤寂音尊者亦嘗疑之云道悟似有兩人無盡後於達觀頴處得唐符載所撰天皇道悟塔記又討得丘玄素所作天王道悟塔記賫以遍示諸方曰吾嘗疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記證之朗然明白方知吾擇法驗人之不謬耳寂音曰圭峯答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下江曰兼稟徑山今妄以雲門臨濟二宗兢者可發一笑略書梗槩以傳明達者始知五家之正派如是而已一喝分五教淨因蹣庵成禪師同法真圓悟慈受并十大法師齋于太尉陳公良弼府第時徽宗私幸觀其法會善華嚴者對衆問諸禪師曰吾佛説教自小乘至圓頓掃除空有獨證真常然後萬德莊嚴方名為佛禪家一喝轉凡成聖與諸經論似相違背今一喝若能入五教是為正説若不能入是為邪説諸禪師顧成成曰如法師所問不足諸大禪師之酬淨因小長老可以使法師無惑也成召善善應諾成曰法師所謂佛法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不空而不有不有而不空義也如我一喝非唯能入五教至於百工技藝諸子百家悉皆能入成乃喝一喝問善曰還聞麼善曰聞成曰汝既聞則此一喝是有能入小乘教成須臾又召善曰還聞麼曰不聞成曰汝既不聞則適來一喝是無能入始教成又顧善曰我初一喝汝既道有喝久聲消汝復道無道無則元初實有道有則于今實無不有不無能入終教成又曰我有一喝之時有非是有因無而有無一喝之時無非是無因有故無即有即無能入頓教成又曰我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫遍虗空即此一喝入百千萬億喝百千萬億喝入此一喝是能入圓教善不覺身起于坐再拜於成之前成復為善曰非唯一喝為然乃至語默動靜一切時一切處一切物一切事契理契機周遍無餘於是四衆歡喜聞所未聞龍顏大悅謂左右侍臣曰禪師有如此玄談妙論太尉啓曰此乃禪師之餘論耳附宗門雜録四條卷終
