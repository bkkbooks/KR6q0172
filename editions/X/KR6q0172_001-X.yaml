body:
  text: 明嗣祖沙門費隱通容輯著居士夏春暉龔士龍較靈源惟深禪師曰今之學者未脫生死病在甚麼處病在偷心未死耳然非其罪為師者之罪也如漢高帝紿韓信而殺之信雖死其心果死乎古之學者言下脫生死效在什麼處效在偷心已死然非學者自能爾實為師者鉗鎚妙密也如梁武帝御大殿見侯景不動聲氣而景之心已枯竭無餘矣諸方所說非不美麗要之如趙冒𦘕花花雖逼真而非真花也通容曰偷心之說乃學者之通病從微至著起倒自存其於鯁胷之物未去應事接物光不透脫皆是也具有正知見善知識為其解粘去縛抽釘拔楔固自鉗鎚妙密令他個個如獅如象似虎似龍頓繇自在曾有恁麼人試舉似看鎮州臨濟義玄禪師初在黃檗會中行業純一時睦州為第一座乃問上座在此多少時師曰三年州曰曾參問否師曰不曾參問不知問個甚麼州曰何不問堂頭和尚如何是佛法的的大意師便去問聲未絕檗便打師下來州曰問話作麼生師曰某甲問聲未絕和尚便打某甲不會州曰但更去問師又問檗又打如是三度問三度被打師白州曰早承激勸問法累蒙和尚賜棒自恨障緣不領深旨今且辭去州曰汝若去須辭和尚了去師禮拜退州先到黃檗處曰問話上座雖是後生却甚奇特若來辭方便接伊已後為一株大樹覆蔭天下人去在師來日辭黃檗檗曰不須他去祇往高安灘頭參大愚必為汝說師到大愚愚曰甚處來師曰黃檗來愚曰黃檗有何言句師曰某甲三度問佛法的的大意三度被打不知某甲有過無過愚曰黃檗與麼老婆心切為汝得徹困更來這裡問有過無過師於言下大悟乃曰元來黃檗佛法無多子愚搊住曰追尿牀鬼子適來道有過無過如今却道黃檗佛法無多子汝見個什麼道理速道速道師於大愚肋下築三拳愚拓開曰汝師黃檗非干我事師辭大愚却回黃檗檗見便問這漢來來去去有甚了期師曰祇為老婆心切便人事了侍立檗問甚處去來師曰昨蒙和尚慈旨令參大愚去來檗曰大愚有何言句師舉前話檗曰大愚老漢饒舌待來痛與一頓師曰說甚待來即今便打隨後便掌檗曰這風顛漢來這裡捋虎𩯭師便喝檗喚侍者曰引這風顛漢參堂去通容曰黃檗為臨濟徹骨徹髓向大愚言下識破始覺秤鎚硬如鐵矣然臨濟悟道全得黃檗力而亦得大愚為其助也且大愚拓開云汝師黃檗非干我事乃知大愚亦有廓然太公之心不將臨濟為己胤直顯黃檗之功然亦因黃檗鉗鎚嚴辣使臨濟機用頓發故大愚不居其功也臨濟既悟向大愚肋下三拳直明恁麼消息黃檗一掌逈出一切羅籠其如太阿劍不可犯鋒故臨濟一宗高天下豈非源深而流長乎魏府興化存獎禪師在三聖會裡為首座常曰我向南方行脚一遭拄杖頭不曾撥著一個會佛法底人三聖聞得問曰汝具個什麼眼便恁麼道師便喝聖曰須是汝始得後大覺聞舉遂曰作麼生得風吹到大覺門裡來師後到大覺為院主一日覺喚院主我聞汝道向南方行脚一遭拄杖頭不曾撥著一個會佛法底人汝憑個甚麼道理與麼道師便喝覺便打師又喝覺又打師來日從法堂過覺召院主我直下疑汝昨日這兩喝師又喝覺又打師再喝覺又打師曰某甲於三聖師兄處學得個賓主句總被師兄折倒了也願與某甲個安樂法門覺曰這瞎漢來這裡納敗缺脫衣痛打一頓師於言下薦得臨濟先師於黃檗處喫棒底道理通容曰興化眼空四海傍若無人一雙眼睛被大覺打落向急急如律令處與臨濟相見故得嗣臨濟焉昨日兩喝次日兩喝不為分外而云學得個賓主句總被師兄折倒了也則敗露不少不因大覺痛與鉗鎚爭見臨濟於黃檗處喫棒底道理也定上座初參臨濟問如何是佛法大意濟下禪牀擒住師擬議濟與一掌師佇思傍僧曰定上座何不禮拜師方作禮忽然大悟後南遊路逢巖頭雪峯欽山三人巖頭問上座甚處來師曰臨濟來巖曰和尚萬福師曰和尚已順世也巖曰某甲三人特去禮拜福薄不遇不知和尚在日有何言句請上座舉一兩則師遂舉臨濟上堂曰赤肉團上有一無位真人常在汝等諸人面門出入未證據者看看時有僧問如何是無位真人濟下禪牀搊住曰道道僧擬議濟拓開曰無位真人是甚麼乾屎橛嚴頭不覺吐舌雪峯曰臨濟大似白拈賊欽山曰何不道赤肉團上非無位真人師便擒住曰無位真人與非無位真人相去多少速道速道欽山被擒直得面黃面青語之不得巖頭雪峯曰這新戒不識好惡觸忤上座且望慈悲師曰若不是這兩個老漢𡎺殺這尿牀鬼子師在鎮府齋回到橋上坐次逢座主三人一人問如何是禪河深處須窮到底師擒住擬拋向橋下二座主近前諫曰莫恠觸忤上座且望慈悲師曰若不是這兩個座主直教他窮到底通容曰臨濟一機傍僧一拶令上座向剎竿頭上翻身不存玄解故擒欽山拋座主如逆鱗徑尺不可觸犯雖然剛刀雖利不斬無罪之人如何是無罪一句守廓行者行脚到棄州華嚴和尚會下一日嚴上堂曰大眾今日若是臨濟德山高亭大愚鳥窠船子兒孫不用如何若何便請單刀直入華嚴與汝證據師出禮拜起便喝嚴亦喝師又喝嚴亦喝師禮拜起曰大眾看這老漢一場敗缺又喝一喝相手歸眾嚴下座歸方丈時風穴作維那上去問訊嚴曰維那汝來也尀耐守廓適來把老僧扭揑一上待集眾打一頓趂出穴曰趂他遲了也自是和尚言過他是臨濟下兒孫本分恁麼嚴方息怒穴下來舉似師師曰汝著甚來繇勸這漢我未問前早要棒喫得我話行如今不打搭却我這話也穴曰雖然如是已遍天下也通容曰華嚴龍頭蛇尾不能令守廓契服若是山僧當時見他道大眾看這老漢一塲敗闕聲未絕便連棒打出不惟兩個作家益見華嚴令不虗行而對維那云待集眾打一頓趂出可謂當塲不勇陣後興兵又納一重敗闕也廬州澄心院旻德禪師在興化遇示眾曰若是作家戰將便請單刀直入更莫如何若何師出禮拜起便喝化亦喝師又喝化亦喝師禮拜歸眾化曰適來若是別人三十棒一棒也較不得何故為他旻德會一喝不作一喝用通容曰旻德固是作家風規自見興化曰為他旻德會一喝不作一喝用且道意旨如何這裡若具一隻眼不妨超宗異目作個當家種草汾州太子院善昭禪師太原俞氏子剃髮受具杖䇿遊方所至少留隨機叩發歷參知識七十一員後到首山問百丈卷席意旨如何山曰龍袖拂開全體現曰師意如何山曰象王行處絕狐蹤師於言下大悟拜起而曰萬古碧潭空界月再三撈摝始應知有問者曰見何道理便爾自肯師曰正是我放身命處通容曰首山如此答話使善昭坐斷乾坤不留朕迹蓋師資道契非偶然耳看他參七十一員善知識其披蓁決膜固亦多多智窮力盡故能自肯不可不知也汝州葉縣廣教院歸省禪師遊方參首山山一日舉竹篦問曰喚作竹篾即觸不喚作竹篦即背喚作什麼師掣得擲地上山曰瞎師於言下豁然頓悟通容曰夜來火發裩烈焰內外紅遭著燒粉碎鈍銕化成膿且道與首山相為相去多少潭州石霜慈明楚圓禪師聞汾陽道望遂往謁焉陽顧而默器之經二年未許入室每見必罵詬或毀詆諸方及有所訓皆流俗鄙事一夕訴曰自至法席已再夏不蒙指示但增世俗塵勞念歲月飄忽己事不明失出家之利語未卒陽熟視罵曰是惡知識敢裨販我怒舉杖逐之師擬伸救陽掩師口乃大悟曰是知臨濟道出常情服役七年辭去師一日謁神鼎諲禪師鼎首山高弟望尊一時衲子非人類精奇無敢登其門者住山三十年門弟子氣吞諸方師髮長不剪弊衣楚音通謁稱法侄一眾大笑鼎遣童子問長老誰之嗣師仰視屋曰親見汾陽來鼎杖而出顧見欣然問曰汾州有西河獅子是否師指其後絕叫曰屋倒矣童子返走鼎回顧相矍鑠師地坐脫隻履而視之鼎老忘所問又失師所在師徐整衣且行且語曰見面不如聞名遂去鼎遣人追之不可嘆曰汾州乃有此兒耶師自是名重叢林通容曰汾陽為人有全機電卷大用天旋使慈明向機下脫羅籠出窠臼知臨濟道出常情見神鼎有赤手殺人作略單刀直入施縱以他出汾陽閫域故有超方眼目一等抱柱澡足把纜放舟豈能窺其萬一耶文公楊億居士字大年幼舉神嬰及壯負才名而未知有佛一日過同僚見讀金剛經笑且罪之彼讀自若公疑之曰是豈出孔孟之右乎何侫甚因閱數板懵然始少敬信後會翰林李公維勉令參問及繇秘書監出守汝州首謁廣慧慧接見公便問布鼓當軒擊誰是知音者慧曰來風深辨公曰恁麼則禪客相逢祇彈指也慧曰君子可入公應諾諾慧曰草賊大敗夜語次慧曰秘監曾與甚人道話來公曰某曾問雲巖諒監寺兩個大蟲相齩時如何諒曰一合相某甲祇管看未審恁麼道還得麼慧曰這裡即不然公曰請和尚別一轉語慧以手作拽鼻勢曰這畜生更𨁝跳在公於言下脫然無疑有偈曰八角磨盤空裡走金毛獅子變作狗擬欲將身北斗藏應須合掌南辰後通容曰大年與廣慧初相見機語亦是此門氣息及論至諒監寺答兩個大蟲相齩話被廣慧奮獅子威因之狐疑頓息故偈語山格無依傍凡在此道者莫不贊服大都內因蘊藉之功外感提掇之緣故道價傑出洪州翠巖可真禪師福州人也甞參慈明因之金鑾同善侍者坐夏善乃慈明高弟道吾真楊岐會皆推伏之師自負親見慈明天下無可意者善與語知其未徹笑之一日山行舉語鋒發善拈一片瓦礫置盤石上曰若向這裡下得一轉語許汝親見慈明師左右視之擬對善叱曰竚思停機情識未透何曾夢見師自愧悚即還石霜慈明見來叱曰本色行脚人必知時節有甚急夏未了早至此師泣曰被善兄毒心終礙塞人故來見和尚明遽問如何是佛法大意師曰無雲生嶺上有月落波心明嗔目喝曰頭白齒豁猶作這個見解如何脫離生死師悚然求指示明曰汝問我師理前話問之明震聲曰無雲生嶺上有月落波心師於言下大悟通容曰善侍者固是豪邁之士觀其可真亦有大英靈但意地未徹故死機下再見慈明與他拈却太湖蓋掇出鄱陽湖以後竟無人奈何得吾知出頭須是英靈漢敵勝還他獅子兒二公有之南嶽雲峯文悅禪師南昌徐氏子初造大愚聞示眾曰大家相聚喫莖虀若喚作一莖虀入地獄如箭射便下座師大駭夜造方丈愚問來何所求師曰求心法愚曰法輪未轉食輪先轉後生趂色力徤何不為眾乞食我忍飢不暇何暇為汝說禪乎師不敢違未幾愚移翠巖師納疏罷復過翠巖師求指方巖曰佛法未到爛却雪寒宜為眾乞炭師亦奉命能事罷復造方丈巖曰堂司闕人今以煩汝師受之不樂恨巖不去心坐後架桶篐忽散自架墮落師忽然開悟頓見巖用處走搭伽黎上寢堂巖迎笑曰維那且喜大事了畢師再拜不及吐一辭而去服勤八年通容曰大愚開示悅公嚴密無巴鼻非悅公亦難受教然亦春回大地萬象咸新悅因時令相觸始覺春風滿袖今人知見夾雜說道理禪接人又以講解為事見大愚如此作用亦將為人解說要人依行種種施縱如兵宼作亂使人終無下落豈知大愚獨住寰中乎節使李端願居士兒時在舘舍常閱禪書長雖婚官然篤志祖道遂後圃築室類蘭若邀達觀師朝夕咨參至忘寢食觀一日視公曰非示現力豈致爾哉奈無個所入何公問曰天堂地獄是有是無請師明說觀曰諸佛向無中說有眼見空華太尉就有裡尋無手摣水月堪笑眼前見牢獄不避心外聞天堂欲生殊不知忻怖在心善惡成境太尉但了自心自然無惑公曰心如何了觀曰善惡都莫思量公曰不思量後心歸何所觀曰且請太尉歸宅公曰祇如人死後心歸何所觀曰未知生焉知死公曰生則某已知之觀曰生從何來公罔措觀起揕其胷曰祇在這裡更擬思量個什麼公曰會得也觀曰作麼生會公曰祇知貪途不覺蹉路觀拓開曰百年一夢今日方省既而說偈曰三十八歲懵然無知及其有知何異無知滔滔江水隱隱隨堤師其歸矣箭浪東馳通容曰達觀日夕與端愿鋾鑄使端愿道奧日臻機緣純熟於盤桓處向結角邊一拶便為碗脫丘始知貪程不覺蹉路如孫臏用兵死龐涓於馬陵然涓亦技窮計盡祇知貪程不覺蹉路舒州白雲守端禪師衡陽葛氏子幼事翰墨冠依茶陵郁禪師披削往參楊岐岐問受業師為誰師曰茶陵郁和尚岐曰吾聞伊過橋遭攧有省作偈甚奇能記否師誦曰我有明珠一顆久被塵勞關鎻今朝塵盡光生照破山河萬朵岐笑而趨起師愕然通夕不𥧌黎明咨詢之適歲暮岐曰汝見昨日打歐儺者麼曰見岐曰汝一籌不及渠師復駭曰意旨如何岐曰渠愛人笑汝怕人笑師大悟通容曰楊岐在慈明會下多年作監寺不入堂儀而得大悟張臨濟之道接白雲端公擒縱出奇殺活自繇使端公疑心頓死及從上尊宿莫不具擒龍捉虎手段不昧西來之旨直顯單傳之妙真所謂克家兒孫光裕門庭者靳州五祖法演禪師謁圓照本禪師古今因緣會盡唯不會僧問興化四方八面來時如何化云打中間底僧作禮化云我昨日赴個村齋中途過一陣卒風暴雨却向古廟裡避得過請益本本曰此是臨濟下因緣須是問他家兒孫始得師遂謁浮山遠禪師請益前話遠云我有個譬喻說似汝汝一似個三家村裡賣柴漢子把個扁擔向十字街頭立地問人中書堂今日商量甚麼事師默計云若如此大故未在遠一日語師曰吾老矣恐虗度子光陰可往依白雲此老雖後生吾未識面但見其頌臨濟三頓棒話有過人處必能了子大事師澘然禮辭至白雲遂舉僧問南泉摩尼珠話請問雲叱之師頓悟獻投機偈曰山前一片閑田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風雲特印可令掌磨事未幾雲至語師曰有數個禪客自廬山來皆有悟入處教伊說亦說得有來繇舉因緣問伊亦明得教伊下語亦下得祇是未在師於是大疑私自計曰既悟了說亦說得明亦明得如何却未在遂參究累日忽然省悟從前寶惜一時放下走見白雲雲為手舞足蹈師亦一笑而已師後曰吾因茲出一身白汗便明得下載清風通容曰古人不叨濫為人然亦不埋沒諸方眼目如浮山遠指五祖演往見白雲端真為退己讓人萬中無一使演公至彼傾心其道一叱之下便能投機非遠公吹噓莫能致也雖則暫為途路而端師相為必欲到家故演公得明下載清風且道意旨如何佛果禪師最後見五祖盡其機用祖皆不諾乃謂祖強移換人出不遜語忿然而去祖曰待汝著一頓熱病打時方思量我在師到金山染傷寒困極以平日見處試之無得力者追繹五祖之言乃自誓曰我病稍間即歸五祖病痊尋歸祖一見而喜令參堂便入侍者療方半月會部使者解印還蜀詣祖問道祖曰提刑少年曾讀小艶詩否有兩句頗相近頻呼小玉原無事祇要檀郎認得聲提刑應諾諾祖曰且子細師適歸侍立次問曰聞和尚舉小艶詩提刑會否祖曰他祇認得聲師曰祇要檀郎認得聲他既認得聲為什麼却不是祖曰如何是祖師西來意庭前栢樹子聻師忽有省遽出見鷄飛上欄干鼓翅而鳴復自謂曰此豈不是聲遂袖香入室通所得呈偈曰金鴨香銷錦繡幃笙歌叢裡醉扶歸少年一段風流事祇許佳人獨自知祖曰佛祖大事非小根劣器所能造詣吾助汝喜祖徧謂山中耆舊曰我侍者參得禪也繇此所至推為上首通容曰五祖種種相為使佛果見色聞聲則不無若離却藥忌一句也道不看試端的看臨安府徑山宗杲大慧普覺禪師師至天寧一日聞圓悟陞堂舉僧問雲門如何是諸佛出身處門曰東山水上行若是天寧即不然忽有人問如何是諸佛出身處只向他道薰風自南來殿閣生微凉師於言下忽然前後際斷雖然動相不生却坐在淨躶躶地悟謂曰也不易汝得到這田地可惜死了不能得活不疑言句是為大病不見道懸巖撒手自肯承當絕後再甦欺君不得須信有這個道理遂令居擇木堂為不釐務侍者日同士大夫入室悟每舉有句無句如藤倚樹問之師纔開口悟便曰不是不是經半載遂問悟曰聞和尚當時在五祖曾問這話不知五祖道甚麼悟笑而不答師曰和尚當時須對眾問如今說亦何妨悟不得已謂曰我問有句無句如藤倚樹意旨如何祖曰描也描不成𦘕也𦘕不就又問樹倒藤枯是如何祖曰相隨來也師當下釋然曰我會也悟遂舉數則因緣詰之師酬對無滯悟曰始知吾不汝欺通容曰大慧初歷洞上諸老宿不能了其事在湛堂會下鋾鑄多年堂一日為師曰杲上座我這裡禪汝一時理會得教汝說也說得教汝作拈古頌古小參普說汝都做得祇是有一件事未在汝還知麼對曰甚麼事湛堂曰汝祇欠這一解在㘞若汝不得這一解方丈與汝說時便有禪纔出方丈便無了惺惺思量時便有禪纔睡著便無禪若如此如何敵得生死對曰正是某甲疑處後湛堂疾亟問曰和尚若不起此疾教某依附誰可以了此大事曰有個勤巴子戒亦不識他汝若見之必能成就此事若見他了不得便脩行去後世出來參禪師依其教參圓悟初於薰風南來殿閣微凉便爾堂堂坐斷絕去來今後於描不成𦘕不就處驀面識破分明懸巖撒手絕後再甦固圓悟之鉗鎚也平江府虎丘紹隆禪師謁圓悟一日入室悟問曰見見之時見非是見見猶離見見不能及舉拳曰還見麼師曰見悟曰頭上安頭師聞脫然契悟悟叱曰見個什麼道理師曰竹密不妨流水過悟肯之通客曰圓悟為紹隆向歷落地拈出吹毛劒纖悉俱斬隆師即得尋避無地然亦火裡蝍蟟啣月走慶元府育王山佛智端裕禪師晚見圓悟於鍾阜一日悟問誰知正法眼藏向這瞎驢邊滅却即今是滅不滅曰請和尚合取口好悟曰此猶未出常情師擬對悟擊之師頓去所滯通容曰圓悟鈎錐快利用鈎則鈎動筋骨用錐則錐教血出以致佛智性命不存且道如何過日咄平江府南峯雲辨禪師後參圓悟值入室纔踵門悟曰看脚下師打露柱一下悟曰何不著實道一句師曰師若搖頭弟子擺尾悟曰汝試擺尾看師翻筋斗而出悟大笑通容曰雲辨擺尾則不無若遇藕孔尾巴定過不得臨安府靈隱慧遠禪師會圓悟復領昭覺師即之聞悟普說舉龐居士問馬祖不與萬法為侶因緣師忽頓悟仆於眾眾掖之師乃曰吾夢覺矣至夜小參師出問曰淨躶躶空無一物赤骨歷貧無一錢戶破家亡乞師賑濟悟曰七珍八寶一時拏師曰禍不入謹家之門悟曰機不離位墮在毒海師隨聲便喝悟以拄杖擊禪牀云喫得棒也未師又喝悟連喝兩喝師便禮拜自此機鋒峻發無所抵捂通容曰慧遠在圓悟會下能極力參究故一入門來便七通八達圓悟雖種種羅籠竟難曲折矣成都府昭覺徹庵禪師依圓悟於金山以所見告悟弗之許悟被詔住雲居師從之雖有信入終以鯁胸之物未去為疑會悟問參徒生死到來時如何僧曰香臺子笑和尚次問師汝作麼生師曰草賊大敗悟曰有人問汝時如何師擬答悟憑陵曰草賊大敗師即徹證圓悟以拳擊之師拊掌大笑悟曰汝見甚麼便如此師曰毒拳未報永劫不忘悟歸昭覺命首眾悟將順世以師繼席焉通容曰徹庵既徹證圓悟復擊一拳不得作勘驗會不得作腦後一椎會不得作探竿會且道如何咦臨安府中天竺堂中仁禪師進具後往來三藏譯經所諦窮經論特於宗門未之信時圓悟居天寧凌晨謁之悟方為眾入室師見敬服奮然造前悟曰依經解義三世佛冤離經一字即同魔說速道速道師擬對悟劈口擊之因墜一齒即大悟通容曰㑃堂往來譯經所諦窮經論成個爛冬瓜遇圓悟一揑即粉碎矣但瓜中蒂不得動著動著即禍生也眉州象耳山袁覺禪師一日誦法華經至亦復不知何者是火何者是舍乃豁然制罷歸省性見首肯之圓悟再得旨住雲居師至彼以所得白悟悟呵曰本是淨地屙屎作麼師所疑頓釋通容曰袁覺於火宅品脫却身面衣服於圓悟言下除去襯裏布衫山僧如此判斷於袁覺分上更有一句未曾道著且道是那一句郡王趙令衿字表之號超然居士公與汪內翰藻李參政邴曾侍郎開詣徑山謁大慧慧聞至乃令繫鼓入室公欣然袖香趨之慧曰趙州洗鉢盂話居士作麼生會公曰討甚麼碗拂袖便出慧趨搊住曰古人向這裡悟去汝因甚麼却不悟公擬對慧𢮁之曰討甚麼碗公曰還這老漢始得通容曰超然明剪裁大慧暗穿針明剪裁風度可觀暗穿針縷線撮破簡點將來二人俱好三十棒且道過在何處常德府文殊心道禪師聞佛鑑禪師夜參舉趙州栢樹子話至覺鐵嘴云先師無此語莫謗先師好因大疑提撕既久一夕豁然即趨丈室擬敘所悟鑑見來便閉門師曰和尚莫謾某甲鑑云十方無壁落何不入門來師以拳擉牕紙鑑即開門搊住云道道師以爾手捧鑑頭作口啐而出遂呈偈曰趙州有個栢樹話禪客相傳遍天下多是摘葉與尋枝不能直向根源會覺公說道無此語正是惡言當面罵禪人若具通方眼好向此中辨真假鑑深然之每對容稱賞後命分座通容曰佛鑑閉門深辨來風心道破牕把捉不住祇因識破栢樹子故眉鬚墮落也安吉州何山佛燈守珣禪師郡之施氏子參廣鑑瑛禪師不契遂造太平隨眾咨請邈無所入乃封其衾曰此生若不徹去誓不展此於是晝坐宵立如喪考妣逾七七日忽佛鑑上堂曰森羅及萬象一法之所印師聞頓悟往見鑑鑑曰可惜一顆明珠被這風顛漢拾得乃詰之曰靈雲道自從一見桃華後直至而今更不疑如何是他不疑處師曰莫道靈雲不疑只今覓個疑處了不可得鑑曰玄沙道諦當甚諦當敢保老兄未徹在那裡是他未徹處師曰深知和尚老婆心切鑑然之師拜起呈偈曰終日看天不舉頭桃華爛熳始擡頭饒君更有遮天網透得牢關即便休鑑囑令護持是夕厲聲謂眾曰珣上座穩睡去也圜悟聞得疑其未然乃曰我須勘過始得遂令人召至因與遊山偶到一水潭悟推師入水遽問曰牛頭未見四祖時如何師曰潭深魚聚悟曰見後如何師曰樹高招風悟曰見與未見時如何師曰伸脚在縮脚裡悟大稱之通容曰參禪能如老珣無有不悟徹者然亦依佛鑑明眼宗師印到不疑之地故圓悟勘驗極其艱險總無變色溫州龍翔竹菴士珪禪師成都史氏子初依大慈宗雅心醉楞嚴逾五秋南遊謁諸尊宿始登龍門即以平時所得白佛眼眼曰汝解心已極但欠著力開眼且遂俾軄堂司一日侍立次問云絕對待時如何眼曰如汝僧堂中白椎相似師罔措眼至晚抵堂司師理前話眼曰閒言語師於言下大悟通容曰士珪若於佛眼初一轉語悟去定成個不走作底宗師不合向閒言語句下大悟未免棄溺投火若遇明眼人一任舉似安吉州道塲正堂明辯禪師聞僧舉佛眼以古詩發明罽賓國王斬師子尊者話曰楊子江頭楊柳春楊花愁殺渡江人羗笛數聲離庭晚君向湘江我向秦師默有所契即趨龍門求入室佛眼問從上祖師冊子因緣許汝會得忽舉拳曰這個因何喚作拳師擬對眼築其口曰不得作道理於是頓去知見通容曰這個因何喚作拳覿面相提如箭急衲僧若解離弦旨分明勘破維摩詰泉州教忠晦菴彌光禪師謁圓悟禪師於雲居次參黃檗祥高菴悟機語皆契以淮楚盜起歸謁佛心會大慧寓廣因往從之慧謂曰汝在佛心處所得者試舉一二看師舉佛心上堂拈普化公案曰佛心即不然總不恁麼來時如何劈脊便打從教遍界分身慧曰汝意如何師曰某不肯他後頭下個註脚慧曰此正是以病為法師毅然無信可意慧曰汝但揣摩看師以為不然經旬因記海印信禪師拈曰雷聲浩大雨點全無始無滯趨告慧慧以舉道者見瑯瑘并玄沙未徹語詰之師對已慧笑曰雖進得一步祇是不著所在如人斫樹根下一刀則命根斷矣汝向枝上斫其能斷命根乎今諸方浩浩說禪者見處總如此何益於事其楊岐正傳三四人而已師慍而去異日慧問汝還疑否師曰無可疑者慧曰祇如古人相見未開口時已知虗實或聞其語便識淺深此理如何師悚然汗下莫知所詣慧令究有句無句慧過雲門菴師侍行一日問曰某到這裡不能得徹病在甚處慧曰汝病最癖世醫拱手何也別人死了活不得汝今活了未曾死要到大安樂田地須死一回始得師疑情愈深後入室慧問喫粥了也洗鉢盂了也去却藥忌道將一句來師曰裂破慧震威喝曰汝又說禪也師即大悟慧撾鼓告眾曰龜毛枯得笑咍咍一擊萬里關鎻開慶快平生在今日孰云千里賺吾來師亦以頌呈之曰一拶當機怒雷吼驚起須彌藏北斗洪波浩渺浪滔天拈却鼻孔失却口通容曰彌光先於四老宿會下機語皆相契及大慧言下又去不得蓋偷心未死見影猶存故也大慧手段高令他去皮去肉末後向骨髓裡深用鈎錐直得鉢盂向地擎以他悟處脫略而大慧喜亦不禁故說偈特為印許
